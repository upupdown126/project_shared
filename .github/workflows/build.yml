name: build
on:
  push:
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config default-libmysqlclient-dev libcurl4-openssl-dev \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev \
            qtbase5-dev qtmultimedia5-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSMART_HOME_WITH_MYSQL=ON
      - name: Build
        run: cmake --build build -j2
      - name: Test
        run: ctest --test-dir build --output-on-failure
