# Local development configuration; data is lost when the process exits.
ip 127.0.0.1
port 38000
thread_num 2
task_num 1000
video_path ./data
log_file ./log/server.log
database_driver memory
camera_base_url http://127.0.0.1:39000
camera_api_secret local-camera-secret
http_timeout_seconds 3
stream_ring_capacity 64
stream_fragment_size 65536
hls_ip 127.0.0.1
hls_port 38080
hls_public_url http://127.0.0.1:38080
hls_access_secret local-hls-secret-change-me
hls_url_ttl_seconds 300
recording_segment_seconds 10
recording_retry_seconds 5
recording_retention_days 7
storage_max_gib 0
recording_maintenance_seconds 3600
